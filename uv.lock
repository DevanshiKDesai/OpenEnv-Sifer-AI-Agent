version = 1
requires-python = ">=3.10"

[[package]]
name = "sifer-trust-env"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "pydantic" },
  { name = "openai" },
  { name = "fastapi" },
  { name = "uvicorn", extra = ["standard"] },
  { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
  { name = "pydantic", specifier = ">=2.0,<3.0" },
  { name = "openai", specifier = ">=1.0,<2.0" },
  { name = "fastapi", specifier = ">=0.110.0" },
  { name = "uvicorn", extras = ["standard"], specifier = ">=0.29.0" },
  { name = "openenv-core", specifier = ">=0.1.0" },
]

